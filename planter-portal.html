<!DOCTYPE html>
<html>
<head>

        .dashboard { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        .header { background: #27ae60; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .live-card { border: 2px solid #27ae60; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #f9fffb; }
        .price { font-size: 2.5rem; color: #27ae60; font-weight: bold; margin: 10px 0; }
        .quality-tag { display: inline-block; background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; margin: 2px; }
        .history { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .history-item { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px dotted #ccc; }
    </style>
</head>
<body>

        <h3 id="lot-num" style="margin: 5px 0;">IDLE</h3>
        <div class="price" id="current-price">₹0</div>
        <div id="quality-info"></div>
    </div>

    <div class="history">
        <h4>📋 My Sales Today</h4>
        <div id="my-sales"></div>
    </div>
</div>
