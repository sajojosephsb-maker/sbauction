<div class="dashboard">
    <div id="live-lot-details" style="background: #fff; padding: 15px; border-radius: 10px;">
        <h2 id="lot-num">Lot: --</h2>
        <div class="price" id="current-price">₹0</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; text-align: left;">
            <div><b>Center:</b> <span id="d-center">-</span></div>
            <div><b>Weight:</b> <span id="d-weight">-</span>kg</div>
            <div><b>Moisture:</b> <span id="d-moist">-</span>%</div>
            <div><b>Liter Wt:</b> <span id="d-lit">-</span></div>
            <div><b>Bank:</b> <span id="d-bank">-</span></div>
            <div><b>Acc:</b> <span id="d-acc">-</span></div>
        </div>
    </div>
</div>

<script>
    socket.on('updateBid', (data) => {
        document.getElementById('lot-num').innerText = "Lot: " + data.lotNumber;
        document.getElementById('current-price').innerText = "₹" + data.highestBid;
        document.getElementById('d-center').innerText = data.collectionCentre || "-";
        document.getElementById('d-weight').innerText = data.qtyWithoutBag || "-";
        document.getElementById('d-moist').innerText = data.moisture || "-";
        document.getElementById('d-lit').innerText = data.literWeight || "-";
        document.getElementById('d-bank').innerText = data.bankName || "-";
        document.getElementById('d-acc').innerText = data.accountNo || "-";
    });
</script>
