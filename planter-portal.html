<div id="user-header" style="background:#eee; padding:10px; display:flex; justify-content:space-between;">
    <span id="welcome-msg">Loading...</span>
    <button onclick="logout()">Logout</button>
</div>

<script>
    const userData = JSON.parse(localStorage.getItem('user'));
    if(!userData) window.location.href = 'gateway.html';
    document.getElementById('welcome-msg').innerText = `Welcome, ${userData.name} (${userData.role})`;
    
    function logout() {
        localStorage.clear();
        window.location.href = 'gateway.html';
    }
</script>
