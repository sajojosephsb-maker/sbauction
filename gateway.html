<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Auction Gateway</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #msg { margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Secure Gateway</h2>
    <div id="msg">⌛ Checking system...</div>
    <input type="text" id="loginId" placeholder="Login ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Access Portal</button>
</div>

<script>
    const socket = io('https://spice-auction-server.onrender.com');
    const msg = document.getElementById('msg');

    socket.on('connect', () => {
        msg.innerText = "✅ System Connected";
        msg.style.color = "green";
    });

    socket.on('connect_error', () => {
        msg.innerText = "⏳ Waking up server... please wait 30 seconds.";
        msg.style.color = "orange";
    });

    function handleLogin() {
        const btn = document.querySelector('button');
        btn.innerText = "Verifying...";
        btn.disabled = true;

        const loginId = document.getElementById('loginId').value;
        const password = document.getElementById('password').value;
        socket.emit('attemptLogin', { loginId, password });
    }

    socket.on('loginResponse', (res) => {
        if(res.success) {
            localStorage.setItem('user', JSON.stringify(res.user));
            window.location.href = res.target;
        } else {
            const btn = document.querySelector('button');
            btn.innerText = "Access Portal";
            btn.disabled = false;
            msg.innerText = res.message;
            msg.style.color = "red";
        }
    });
</script>

</body>
</html>
