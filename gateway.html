<!DOCTYPE html>
<html>
<head>
    <title>Spice Auction | Secure Gateway</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background: #1557b0; }
        .footer-note { margin-top: 20px; font-size: 12px; color: #9aa0a6; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🌐 Spice Auction ERP</h2>
        <p>Enter your ID or Phone Number to continue</p>
        
        <input type="text" id="loginId" placeholder="User ID / Phone Number">
        <input type="password" id="password" placeholder="Secure Password">
        
        <button onclick="handleLogin()">Access Portal</button>
        
        <div id="statusMsg" style="color: red; margin-top: 10px; font-size: 13px;"></div>
        <div class="footer-note">Authorized Personnel Only • v2.0</div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('https://spice-auction-server.onrender.com');

        function handleLogin() {
            const loginId = document.getElementById('loginId').value;
            const password = document.getElementById('password').value;
            
            socket.emit('attemptLogin', { loginId, password });
        }

        socket.on('loginResponse', (res) => {
            if(res.success) {
                // Store user details and redirect to their specific page
                localStorage.setItem('userSession', JSON.stringify(res));
                window.location.href = res.target; 
            } else {
                document.getElementById('statusMsg').innerText = res.message;
            }
        });
    </script>
</body>
</html>
