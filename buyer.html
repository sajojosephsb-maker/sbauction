<div id="user-header" style="background:#2c3e50; color:white; padding:15px; display:flex; justify-content:space-between; font-family: sans-serif;">
    <span id="welcome-msg">🔄 Identifying User...</span>
    <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:5px 15px; cursor:pointer; border-radius:4px;">Logout</button>
</div>

<script>
    const userData = JSON.parse(localStorage.getItem('user'));
    if(!userData) {
        window.location.href = 'gateway.html'; // Security redirect
    } else {
        document.getElementById('welcome-msg').innerText = `👤 ${userData.name} | Role: ${userData.role.toUpperCase()}`;
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = 'gateway.html';
    }
</script>
<!DOCTYPE html>
<html>
<head>
    <title>Bidder Terminal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">
    <button onclick="logout()" style="float:right; background:red; color:white; padding:10px;">Logout</button>
    <h1 id="welcome">Loading...</h1>
    <div id="auction-box">
        <h3>Live Bidding Active</h3>
        </div>

    <script>
        const socket = io("https://spice-auction-server.onrender.com");
        const traderId = localStorage.getItem('traderId');

        if (!traderId) {
            window.location.href = "login.html";
        } else {
            document.getElementById('welcome').innerText = "Welcome, " + traderId;
        }

        function logout() {
            localStorage.removeItem('traderId');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
