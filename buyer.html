// Add to the top of the <script> in buyer.html
const currentTrader = localStorage.getItem('traderId');
if (!currentTrader) {
    alert("Please login first!");
    window.location.href = "login.html";
}

// Update the bid function
function placeBid(amount) {
    socket.emit('placeBid', { 
        amount: amount, 
        userId: currentTrader // Uses the ID from login
    });
}
