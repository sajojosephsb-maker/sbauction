<div id="video-container" style="display:none; margin-bottom: 15px;">
    <iframe id="live-webcam" width="100%" height="200" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
    socket.on('updateBid', (data) => {
        // ... existing display updates ...
        if (data.videoUrl) {
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('live-webcam').src = data.videoUrl;
        }
    });
</script>
