#chat-box { height: 150px; overflow-y: auto; background: #2c3e50; padding: 10px; margin-top: 10px; text-align: left; font-size: 0.8rem; }
.search-bar { margin-top: 20px; padding: 10px; background: #1a252f; border-radius: 10px; }

<div class="search-bar">
    <input type="text" id="searchInp" placeholder="Search Lot #" style="width:60%">
    <button onclick="search()">🔍</button>
    <div id="searchRes" style="font-size: 0.8rem; margin-top: 5px;"></div>
</div>

<div id="chat-box"></div>
<input type="text" id="chatMsg" placeholder="Ask a question..." style="width:80%">
<button onclick="sendMsg()">Send</button>

<script>
    function sendMsg() {
        const msg = document.getElementById('chatMsg').value;
        socket.emit('sendChat', { userId: bidderId, msg: msg });
        document.getElementById('chatMsg').value = '';
    }

    socket.on('receiveChat', d => {
        document.getElementById('chat-box').innerHTML += `<div><b>${d.user}:</b> ${d.msg}</div>`;
        document.getElementById('chat-box').scrollTop = 1000;
    });

    function search() {
        socket.emit('searchLot', document.getElementById('searchInp').value);
    }

    socket.on('searchResult', d => {
        document.getElementById('searchRes').innerText = d.error ? d.error : `Lot ${d.lotNumber}: ${d.weight}kg, Start: ₹${d.startPrice}`;
    });
</script>
