<!DOCTYPE html>
<html>
<head>
    <title>Colour Checking Center</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .lab-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .submit-btn:hover { background: #2980b9; }
        #status-msg { margin-top: 15px; font-size: 0.85rem; color: #27ae60; text-align: center; }
    </style>
</head>
<body>

<div class="lab-card">
    <h2>🧪 Lab Quality Entry</h2>
    <p style="font-size: 0.8rem; color: #666;">Enter quality details for the current lot.</p>
    
    <label>Current Lot Number</label>
    <input type="text" id="lotNum" placeholder="e.g. LOT-101" readonly>

    <label>Colour Grade (1-10)</label>
    <select id="colourGrade">
        <option value="Deep Green">Deep Green (Premium)</option>
        <option value="Bright Green">Bright Green</option>
        <option value="Light Green">Light Green</option>
        <option value="Yellowish">Yellowish</option>
    </select>

    <label>Moisture Content (%)</label>
    <input type="number" id="moisture" placeholder="Enter % (e.g. 10.5)" step="0.1">

    <label>Liter Weight (g/L)</label>
    <input type="number" id="literWeight" placeholder="e.g. 450">

    <button class="submit-btn" onclick="sendQuality()">Broadcast Quality Data</button>
    <div id="status-msg"></div>
</div>

<script>
    const socket = io("https://spice-auction-server.onrender.com");
    const userId = localStorage.getItem('bidderId');

    // Automatically sync with the active lot
    socket.on('updateBid', (data) => {
        document.getElementById('lotNum').value = data.currentLot;
    });

    function sendQuality() {
        const qualityData = {
            lot: document.getElementById('lotNum').value,
            colour: document.getElementById('colourGrade').value,
            moisture: document.getElementById('moisture').value + "%",
            literWeight: document.getElementById('literWeight').value + "g/L"
        };

        socket.emit('updateQuality', { 
            userId: userId, 
            quality: qualityData 
        });

        document.getElementById('status-msg').innerText = "✅ Quality updated for " + qualityData.lot;
        setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 3000);
    }
</script>
</body>
</html>
