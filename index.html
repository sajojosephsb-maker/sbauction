<div style="margin-top: 20px; border: 1px solid #d32f2f; padding: 10px;">
    <h4>Record Buyer Payment</h4>
    <input type="text" id="pay-buyer-name" placeholder="Dealer Name">
    <input type="number" id="pay-amount" placeholder="Amount (₹)">
    <button onclick="submitPayment()" style="background: #2e7d32; color: white;">Record Payment</button>
</div>

<script>
    function submitPayment() {
        const buyer = document.getElementById('pay-buyer-name').value;
        const amount = document.getElementById('pay-amount').value;
        const pass = document.getElementById('admin-pass').value;

        socket.emit('recordPayment', {
            buyerName: buyer,
            amountPaid: parseFloat(amount),
            password: pass
        });
        alert("Payment Recorded!");
    }
</script>
