<div style="background: #e1f5fe; padding: 15px; border: 1px solid #0288d1; border-radius: 8px; margin-top: 20px;">
    <h4 style="color: #01579b; margin-top: 0;">💬 Private Buyer Message</h4>
    <input type="text" id="msg-target" placeholder="Recipient Name">
    <textarea id="msg-content" placeholder="Type private message..." style="width:100%; margin: 10px 0;"></textarea>
    <button onclick="sendPrivate()" style="background: #0288d1; color: white; width: 100%;">Send Secret Message</button>
</div>

<script>
    function sendPrivate() {
        const target = document.getElementById('msg-target').value;
        const msg = document.getElementById('msg-content').value;
        const pass = document.getElementById('admin-pass').value;

        socket.emit('sendPrivateMessage', {
            targetName: target,
            message: msg,
            password: pass
        });
        alert("Message dispatched to " + target);
    }
</script>
