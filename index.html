<script>
    socket.on('updateActiveUsers', (users) => {
        const list = document.getElementById('active-users-list');
        list.innerHTML = users.map(user => `
            <tr>
                <td>${user.id}</td>
                <td>${user.name}</td>
                <td><button onclick="kickUser('${user.id}')" style="background:red; color:white; border:none; cursor:pointer;">KICK</button></td>
            </tr>
        `).join('');
    });

    function kickUser(bidId) {
        const pass = document.getElementById('admin-pass').value;
        if(confirm(`Are you sure you want to log out ${bidId}?`)) {
            socket.emit('adminAction', { action: 'KICK_USER', targetId: bidId, password: pass });
        }
    }
</script>
