<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Auction Admin</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .admin-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; background: #fafafa; padding: 15px; border-radius: 8px; text-align: left; }
        .label { font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .value { font-size: 1.2rem; font-weight: bold; color: #2c3e50; display: block; }
        .timer-box { font-size: 2rem; font-weight: bold; color: #e74c3c; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.3s; }
        .btn-accept { background: #27ae60; color: white; }
        .btn-accept:hover { background: #219150; }
        .btn-upload { background: #3498db; color: white; }
        .quick-bid-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-q { flex: 1; padding: 10px; background: #ebf2f7; border: 1px solid #3498db; color: #3498db; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 style="margin-top:0;">Auction Controller</h2>
    <div class="timer-box" id="timer">00</div>
    
    <div class="status-grid">
        <div><span class="label">Current Lot</span><span class="value" id="current-lot">IDLE</span></div>
        <div><span class="label">Weight</span><span class="value" id="weight">0.00 kg</span></div>
        <div><span class="label">Highest Bid</span><span class="value" id="highest-bid">₹0</span></div>
        <div><span class="label">Bidder</span><span class="value" id="highest-bidder">No Bids</span></div>
    </div>

    <div class="quick-bid-row">
        <button class="btn-q" onclick="quickBid(10)">+₹10</button>
        <button class="btn-q" onclick="quickBid(50)">+₹50</button>
        <button class="btn-q" onclick="quickBid(100)">+₹100</button>
    </div>

    <button class="btn btn-upload" onclick="alert('Please select CSV file...')">1. UPLOAD CATALOGUE</button>
    <button class="btn btn-accept" onclick="acceptSale()">2. ✅ ACCEPT & NEXT LOT</button>
</div>

<script>
    const socket = io("https://spice-auction-server.onrender.com");
    const ADMIN_PASS = "spices_admin_2026";

    socket.on('updateBid', (data) => {
        document.getElementById('current-lot').innerText = data.currentLot;
        document.getElementById('weight').innerText = data.weight + " kg";
        document.getElementById('highest-bid').innerText = "₹" + data.highestBid;
        document.getElementById('highest-bidder').innerText = data.highestBidder;
        document.getElementById('timer').innerText = data.timeLeft;
    });

    function quickBid(amt) {
        const current = parseInt(document.getElementById('highest-bid').innerText.replace('₹',''));
        const name = prompt("Enter Bidder Name:");
        if (name) {
            socket.emit('placeBid', { amount: current + amt, bidderName: name });
        }
    }

    function acceptSale() {
        socket.emit('adminAction', { action: 'ACCEPT_AND_NEXT', password: ADMIN_PASS });
    }
</script>

</body>
</html>
