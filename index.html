<style>
    .dashboard-panel { margin-top: 30px; border-top: 2px solid #2e7d32; padding-top: 20px; text-align: left; }
    .win-card { background: #fff; border-left: 5px solid #2e7d32; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .win-card h4 { margin: 0; color: #2e7d32; }
    .win-card p { margin: 5px 0; font-size: 0.85em; color: #555; }
</style>

<div class="dashboard-panel">
    <h3 style="color: #2e7d32;">My Purchase History</h3>
    <div id="my-wins-list">
        <p style="color: #999; font-style: italic;">You haven't won any lots yet this session.</p>
    </div>
</div>

<script>
    // ... (inside your auctionEnded listener)
    socket.on('auctionEnded', (winRecord) => {
        // ... (keep your existing sold-overlay logic)

        // Check if I am the winner
        if (winRecord.winner === myName) {
            saveWinToDashboard(winRecord);
        }
    });

    function saveWinToDashboard(record) {
        // Get existing wins from storage or create new array
        let history = JSON.parse(localStorage.getItem('mySpiceWins') || "[]");
        history.unshift(record);
        localStorage.setItem('mySpiceWins', JSON.stringify(history));
        
        displayWins();
    }

    function displayWins() {
        const listDiv = document.getElementById('my-wins-list');
        const history = JSON.parse(localStorage.getItem('mySpiceWins') || "[]");
        
        if (history.length > 0) {
            listDiv.innerHTML = history.map(win => `
                <div class="win-card">
                    <h4>${win.lot}</h4>
                    <p><b>Price Paid:</b> ₹${win.price}/kg</p>
                    <p><b>Details:</b> ${win.specs.size} | ${win.specs.literWeight}</p>
                    <p style="font-size: 0.7em; color: #999;">Date: ${win.date}</p>
                </div>
            `).join('');
        }
    }

    // Call displayWins on page load
    displayWins();
</script>
