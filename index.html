<div style="margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
    <h3>👤 Manage Traders</h3>
    <input type="text" id="newTraderId" placeholder="Trader ID (e.g. TRADER01)">
    <input type="text" id="newTraderPass" placeholder="Trader Password">
    <button onclick="addTrader()" style="width:100%; padding:10px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer;">Create Trader Login</button>
    
    <div id="trader-status" style="font-size: 0.8rem; margin: 10px 0;"></div>

    <ul id="trader-list" style="text-align: left; font-size: 0.9rem; list-style: none; padding: 0;">
        </ul>
</div>

<script>
    function addTrader() {
        const traderId = document.getElementById('newTraderId').value;
        const traderPassword = document.getElementById('newTraderPass').value;
        const adminPassword = document.getElementById('pass').value;

        if(!traderId || !traderPassword) return alert("Fill all fields");

        socket.emit('createTrader', { traderId, traderPassword, adminPassword });
    }

    socket.on('traderCreated', (res) => {
        const status = document.getElementById('trader-status');
        status.innerText = res.success ? `✅ Created: ${res.id}` : `❌ Error: ${res.message}`;
        status.style.color = res.success ? "green" : "red";
    });

    socket.on('traderListUpdate', (traders) => {
        const list = document.getElementById('trader-list');
        list.innerHTML = "<b>Active Traders:</b>" + traders.map(t => 
            `<li style="padding:5px; border-bottom:1px solid #eee;">🆔 ${t.userId} | 🔑 ${t.password}</li>`
        ).join('');
    });

    // Ask for the list when admin connects
    socket.emit('getTraders');
</script>
