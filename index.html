<audio id="warning-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    function placeBid() {
        const bidAmount = parseInt(document.getElementById('bid-input').value);
        const lotWeight = auctionState.specs.totalWeight;
        const totalBidValue = bidAmount * lotWeight;
        
        // Calculate remaining credit
        const remainingCredit = myCreditLimit - mySpentAmount;

        if (totalBidValue > remainingCredit) {
            // Play warning sound
            document.getElementById('warning-sound').play();
            
            // Visual Alert
            alert(`⛔ Bid Denied! This bid requires ₹${totalBidValue.toLocaleString('en-IN')}, but you only have ₹${remainingCredit.toLocaleString('en-IN')} credit left.`);
            return; // Block the bid from being sent to the server
        }

        // If credit is okay, send the bid
        socket.emit('placeBid', {
            amount: bidAmount,
            bidderName: myName,
            currentSpent: mySpentAmount
        });
    }
</script>
