<div class="box" style="margin-top:20px; width: 100%; max-width: 600px;">
    <h3>👥 Trader Management</h3>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="tId" placeholder="Trader ID">
        <input type="text" id="tPass" placeholder="Password">
        <button onclick="createTrader()" style="background:#27ae60; color:white; border:none; padding:10px; border-radius:5px;">Create</button>
    </div>

    <table style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="background:#f8f9fa;">
                <th>Trader ID</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="trader-list-body"></tbody>
    </table>
</div>

<script>
    function createTrader() {
        const traderId = document.getElementById('tId').value;
        const traderPassword = document.getElementById('tPass').value;
        socket.emit('createTrader', { traderId, traderPassword });
    }

    socket.on('traderListUpdate', (traders) => {
        const body = document.getElementById('trader-list-body');
        body.innerHTML = traders.map(t => `
            <tr>
                <td>${t.userId}</td>
                <td><span style="color:${t.status==='active'?'green':'red'}">${t.status.toUpperCase()}</span></td>
                <td>
                    <button onclick="updateStatus('${t.userId}', 'blocked')" style="background:#f39c12; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Block</button>
                    <button onclick="updateStatus('${t.userId}', 'banned')" style="background:#e74c3c; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Ban</button>
                    <button onclick="updateStatus('${t.userId}', 'active')" style="background:#3498db; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Unblock</button>
                    <button onclick="deleteT('${t.userId}')" style="background:#333; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Delete</button>
                </td>
            </tr>
        `).join('');
    });

    function updateStatus(id, status) { socket.emit('updateTraderStatus', { id, status }); }
    function deleteT(id) { if(confirm('Delete permanently?')) socket.emit('deleteTrader', id); }
    socket.emit('getTraders');
</script>
