<style>
    .leaderboard-card {
        background: #fff;
        border: 1px solid #2e7d32;
        border-radius: 12px;
        padding: 20px;
        margin-top: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .leaderboard-entry {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
    }
    .leaderboard-entry:last-child { border-bottom: none; }
    .rank-1 { color: #d4af37; font-weight: bold; } /* Gold */
</style>

<div class="leaderboard-card">
    <h3 style="color: #2e7d32; margin-top: 0;">🏆 Session Leaderboard</h3>
    <div id="leaderboard-list">
        <p style="color: #999; font-size: 0.9em;">Waiting for first sale...</p>
    </div>
</div>

<script>
    socket.on('updateLeaderboard', (entries) => {
        const list = document.getElementById('leaderboard-list');
        if (entries.length === 0) return;

        list.innerHTML = entries.map(([name, total], index) => `
            <div class="leaderboard-entry ${index === 0 ? 'rank-1' : ''}">
                <span>${index + 1}. ${name}</span>
                <span>₹${total.toLocaleString('en-IN')}</span>
            </div>
        `).join('');
    });
</script>
