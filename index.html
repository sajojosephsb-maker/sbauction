<!DOCTYPE html>
<html>
<head>
    <title>Spice Auction Admin</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; }
        .timer { font-size: 3rem; font-weight: bold; color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
        .btn { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-report { background: #3498db; color: white; margin-top: 10px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Auction Controller</h2>
        <div class="timer" id="timer">00</div>
        <p>Lot: <strong id="current-lot">IDLE</strong> | Price: <strong id="highest-bid">₹0</strong></p>
        <input type="file" id="csvFile" accept=".csv" style="margin: 15px 0;">
        <br>
        <a href="https://spice-auction-server.onrender.com/download-report" class="btn btn-report">📥 Download Daily Report (Excel)</a>
    </div>

    <div class="card">
        <h3>🕒 Last 5 Sales</h3>
        <table>
            <thead><tr><th>Lot</th><th>Buyer</th><th>Rate</th></tr></thead>
            <tbody id="sales-history"></tbody>
        </table>
    </div>

<script>
    const socket = io("https://spice-auction-server.onrender.com");
    socket.on('updateBid', (data) => {
        document.getElementById('timer').innerText = data.timeLeft;
        document.getElementById('current-lot').innerText = data.currentLot;
        document.getElementById('highest-bid').innerText = "₹" + data.highestBid;
        if (data.history) {
            document.getElementById('sales-history').innerHTML = data.history.slice(0, 5).map(s => 
                `<tr><td>${s.lot}</td><td>${s.buyer}</td><td>₹${s.rate}</td></tr>`
            ).join('');
        }
    });

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const rows = ev.target.result.split('\n').slice(1);
            const list = rows.map(r => {
                const c = r.split(',');
                return { lotNumber: c[0].trim(), weight: parseFloat(c[1]), startPrice: parseInt(c[2]) };
            }).filter(i => i.lotNumber);
            socket.emit('uploadCatalogue', { list, password: "spices_admin_2026" });
        };
        reader.readAsText(e.target.files[0]);
    });
</script>
</body>
</html>
