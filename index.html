<div id="user-header" style="background:#2c3e50; color:white; padding:15px; display:flex; justify-content:space-between; font-family: sans-serif;">
    <span id="welcome-msg">🔄 Identifying User...</span>
    <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:5px 15px; cursor:pointer; border-radius:4px;">Logout</button>
</div>

<script>
    const userData = JSON.parse(localStorage.getItem('user'));
    if(!userData) {
        window.location.href = 'gateway.html'; // Security redirect
    } else {
        document.getElementById('welcome-msg').innerText = `👤 ${userData.name} | Role: ${userData.role.toUpperCase()}`;
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = 'gateway.html';
    }
</script>
<div class="section" style="border-left: 5px solid #8e44ad;">
    <h2>📊 Master Report Center</h2>
    <select id="timeFilter">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="annually">Annually</option>
    </select>
    <input type="text" id="filterId" placeholder="Search ID (Trader/Planter/Co)">
    <button onclick="fetchReport()" style="background:#8e44ad">Generate Report</button>
    
    <div id="reportSummary" style="margin-top:15px; font-weight:bold;"></div>
    <table id="reportTable">
        <thead>
            <tr><th>Date</th><th>Lot</th><th>Trader</th><th>Planter</th><th>Price</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    function fetchReport() {
        const time = document.getElementById('timeFilter').value;
        const id = document.getElementById('filterId').value;
        socket.emit('getAdminReports', { time: time, traderId: id }); // Logic can be expanded for all IDs
    }

    socket.on('reportDataUpdate', (data) => {
        const body = document.querySelector("#reportTable tbody");
        let total = 0;
        body.innerHTML = data.map(row => {
            total += row.totalValue;
            return `<tr><td>${new Date(row.timestamp).toLocaleDateString()}</td><td>${row.lotNumber}</td><td>${row.traderId}</td><td>${row.planterId}</td><td>₹${row.finalPrice}</td></tr>`;
        }).join('');
        document.getElementById('reportSummary').innerText = `Total Revenue for Period: ₹${total.toLocaleString()}`;
    });
</script>
