<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin Dashboard | Spice Auction</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .admin-panel { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #27ae60; box-shadow: 0 0 8px #27ae60; }
        .offline { background: #e74c3c; }
        
        .upload-section { background: #f9f9f9; border: 2px dashed #ddd; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: #3498db; background: #f0f7ff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 0.85rem; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #34495e; color: white; }
        .success-msg { color: #27ae60; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="admin-panel">
    <div class="header">
        <h1>🌶️ Admin Auction Control</h1>
        <div>
            <span id="status-light" class="status-dot offline"></span>
            <span id="status-text">Connecting to Server...</span>
        </div>
    </div>

    <div class="upload-section" onclick="document.getElementById('csvFile').click()">
        <h3>Click to Upload Auction CSV</h3>
        <p>Ensure file matches the 25-column format</p>
        <input type="file" id="csvFile" accept=".csv" style="display:none">
        <button style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Select File</button>
    </div>

    <div id="confirm-box" class="success-msg">✅ Data successfully transmitted to Server!</div>

    <h3>Recently Uploaded Lots</h3>
    <table>
        <thead>
            <tr>
                <th>Lot #</th>
                <th>Planter</th>
                <th>Qty</th>
                <th>Moisture</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="preview-table">
            <tr><td colspan="5" style="text-align:center; color:#999;">No data uploaded yet.</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Connect to your Render backend
    const socket = io("https://spice-auction-server.onrender.com");
    const statusLight = document.getElementById('status-light');
    const statusText = document.getElementById('status-text');

    socket.on('connect', () => {
        statusLight.className = "status-dot online";
        statusText.innerText = "Server Online";
    });

    socket.on('disconnect', () => {
        statusLight.className = "status-dot offline";
        statusText.innerText = "Server Offline";
    });

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const rows = ev.target.result.split('\n').slice(1);
            const list = rows.map(r => {
                const c = r.split(',');
                if(c.length < 5) return null;
                return {
                    lotNumber: c[0], collectionCentre: c[1], type: c[2], ownerName: c[3],
                    idNumber: c[4], receiptNumber: c[5], qtyWithBag: c[6], qtyWithoutBag: c[7],
                    literWeight: c[8], bags: c[9], gradeType: c[10], grade: c[11],
                    reservedPrice: c[12], startPrice: c[13], immature: c[14], moisture: c[15],
                    mobile: c[16], special: c[17], colour: c[18], size: c[19], split: c[20],
                    bankName: c[21], branch: c[22], accountNo: c[23], ifsc: c[24]
                };
            }).filter(i => i !== null);

            // SEND DATA TO SERVER
            socket.emit('uploadCatalogue', { list, password: "spices_admin_2026" });

            // UPDATE CONFIRMATION TABLE
            document.getElementById('confirm-box').style.display = 'block';
            const tbody = document.getElementById('preview-table');
            tbody.innerHTML = list.slice(0, 10).map(item => `
                <tr>
                    <td><b>${item.lotNumber}</b></td>
                    <td>${item.ownerName}</td>
                    <td>${item.qtyWithoutBag} kg</td>
                    <td>${item.moisture}%</td>
                    <td style="color:green">Sent ⬆️</td>
                </tr>
            `).join('');
        };
        reader.readAsText(e.target.files[0]);
    });
</script>
</body>
</html>
