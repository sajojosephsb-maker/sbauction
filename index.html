<div style="background: #e0f2f1; padding: 20px; border: 2px solid #00695c; border-radius: 10px; margin-top: 20px;">
    <h3 style="color: #00695c; margin-top: 0;">🌐 Bidders Currently Online</h3>
    <table style="width: 100%; border-collapse: collapse; background: white;">
        <thead>
            <tr style="background: #00695c; color: white;">
                <th style="padding: 10px;">ID</th>
                <th style="padding: 10px;">Name</th>
                <th style="padding: 10px;">Logged In At</th>
                <th style="padding: 10px;">Status</th>
            </tr>
        </thead>
        <tbody id="active-users-list" style="text-align: center;">
            <tr><td colspan="4" style="padding:10px;">No bidders online</td></tr>
        </tbody>
    </table>
</div>

<script>
    socket.on('updateActiveUsers', (users) => {
        const list = document.getElementById('active-users-list');
        if (users.length === 0) {
            list.innerHTML = `<tr><td colspan="4" style="padding:10px;">No bidders online</td></tr>`;
            return;
        }
        list.innerHTML = users.map(user => `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 10px;">${user.id}</td>
                <td style="padding: 10px;"><strong>${user.name}</strong></td>
                <td style="padding: 10px;">${user.loginTime}</td>
                <td style="padding: 10px;"><span style="color:green;">● Active</span></td>
            </tr>
        `).join('');
    });
</script>
