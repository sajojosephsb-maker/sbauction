<div style="margin-bottom: 20px;">
    <input type="text" id="searchInput" placeholder="Search Buyer or Lot..." 
           style="width: 70%; padding: 10px; border-radius: 4px; border: 1px solid #ddd;">
    <button onclick="searchAuction()" style="padding: 10px; cursor: pointer;">🔍 Search</button>
</div>

<div id="searchResults" style="text-align: left; font-size: 0.9rem; max-height: 200px; overflow-y: auto;"></div>

<script>
    async function searchAuction() {
        const query = document.getElementById('searchInput').value;
        // This will call your Render server to ask the Database
        const response = await fetch(`https://spice-auction-server.onrender.com/search?q=${query}`);
        const results = await response.json();
        
        let html = '<ul>';
        results.forEach(res => {
            html += `<li>Lot ${res.lot}: Sold to ${res.buyer} for ₹${res.rate}</li>`;
        });
        html += '</ul>';
        document.getElementById('searchResults').innerHTML = html;
    }
</script>
