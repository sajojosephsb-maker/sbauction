<style>
    .video-container {
        width: 100%;
        background: #000;
        border-radius: 10px;
        margin-bottom: 20px;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 2px solid #2e7d32;
        position: relative;
    }
    .video-overlay-text {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(211, 47, 47, 0.8);
        color: white;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.7em;
        font-weight: bold;
        animation: blinker 1.5s linear infinite;
    }
    @keyframes blinker { 50% { opacity: 0; } }
</style>

<div class="video-container">
    <div class="video-overlay-text">● LIVE FROM PUTTADY CENTER</div>
    <iframe 
        width="100%" 
        height="100%" 
        src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>
