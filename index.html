<style>
    .search-container { margin-bottom: 20px; position: relative; }
    #search-input { width: 80%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
    #search-results { 
        position: absolute; width: 80%; left: 10%; background: white; 
        border: 1px solid #ddd; border-radius: 0 0 10px 10px; z-index: 50; 
        display: none; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .result-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.9em; }
    .result-item:hover { background: #f0f4f0; }
</style>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Search by Grade, Size, or Color..." onkeyup="doSearch()">
    <div id="search-results"></div>
</div>

<script>
    function doSearch() {
        const query = document.getElementById('search-input').value;
        const resultsDiv = document.getElementById('search-results');
        
        if (query.length > 1) {
            socket.emit('searchLots', query);
        } else {
            resultsDiv.style.display = 'none';
        }
    }

    socket.on('searchResults', (results) => {
        const resultsDiv = document.getElementById('search-results');
        if (results.length > 0) {
            resultsDiv.innerHTML = results.map(item => `
                <div class="result-item" onclick="alert('Viewing specs for: ${item.name}')">
                    <strong>${item.name}</strong><br>
                    <small>Size: ${item.specs.size} | Color: ${item.specs.color}</small>
                </div>
            `).join('');
            resultsDiv.style.display = 'block';
        } else {
            resultsDiv.innerHTML = '<div class="result-item">No matching lots found</div>';
            resultsDiv.style.display = 'block';
        }
    });

    // Close search when clicking outside
    document.addEventListener('click', (e) => {
        if (e.target.id !== 'search-input') document.getElementById('search-results').style.display = 'none';
    });
</script>
