<div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 10px;">
    <button onclick="adminCmd('OPEN_BIDS')" style="background:green; color:white;">🔓 Open Bidding</button>
    <button onclick="adminCmd('CLOSE_BIDS')" style="background:orange; color:white;">🔒 Lock Bidding</button>
    <button onclick="adminCmd('RERUN_LOT')" style="background:blue; color:white;">🔄 Re-run Lot</button>
    <button onclick="adminCmd('WITHDRAW_LOT')" style="background:red; color:white;">🚫 Withdraw Lot</button>
</div>

<script>
    function adminCmd(action) {
        const pass = document.getElementById('admin-pass').value;
        socket.emit('adminAction', { action: action, password: pass });
    }
</script>
