<audio id="tick-sound" src="https://actions.google.com/sounds/v1/clocks/mechanical_clock_tick.ogg"></audio>
<audio id="sold-sound" src="https://actions.google.com/sounds/v1/emergency/beep_warning.ogg"></audio>

<script>
    // ... inside your socket.on('timerUpdate') listener
    socket.on('timerUpdate', (timeLeft) => {
        document.getElementById('timer-display').innerText = timeLeft;

        // UI Changes
        if (timeLeft <= 5) {
            document.getElementById('timer-display').style.color = "#d32f2f";
            document.getElementById('timer-display').style.transform = "scale(1.1)";
        } else {
            document.getElementById('timer-display').style.color = "#2e7d32";
            document.getElementById('timer-display').style.transform = "scale(1)";
        }

        // NEW: Audio Alert for last 3 seconds
        if (timeLeft <= 3 && timeLeft > 0) {
            const tick = document.getElementById('tick-sound');
            tick.currentTime = 0; // Reset sound
            tick.play().catch(e => console.log("Audio requires user interaction first"));
        }
    });

    socket.on('auctionEnded', (data) => {
        // ... (keep existing sold overlay logic)
        
        // Play Sold Sound
        document.getElementById('sold-sound').play();
    });
</script>
