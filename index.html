<button onclick="acceptAndNext()" style="background: #2e7d32; color: white; padding: 15px; font-weight: bold; width: 100%; border-radius: 5px; margin-top: 10px;">
    ✅ ACCEPT & START NEXT LOT
</button>

<script>
    function acceptAndNext() {
        const pass = document.getElementById('admin-pass').value;
        if(confirm("Accept current bid and move to next lot?")) {
            socket.emit('adminAction', { action: 'ACCEPT_AND_NEXT', password: pass });
        }
    }
</script>
