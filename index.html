<div class="card">
    <h2>Auction Control</h2>
    <div class="timer" id="timer">00</div>
    <button class="btn" onclick="nextLot()">✅ START / NEXT LOT</button>
    <hr>
    <h3>👥 Approval Pending</h3>
    <div id="user-list"></div>
</div>

<script>
    socket.on('userList', (users) => {
        const list = users.filter(u => !u.isApproved);
        document.getElementById('user-list').innerHTML = list.map(u => `
            <div style="border-bottom:1px solid #eee; padding:5px;">
                ${u.name} (${u.userId}) 
                <button onclick="approve('${u.userId}')">Approve</button>
            </div>
        `).join('') || "No pending users";
    });
    function approve(id) { socket.emit('approveUser', { targetId: id, password: "spices_admin_2026" }); }
</script>
