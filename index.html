<style>
    /* ... existing styles ... */
    .specs-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        background: #f9f9f9;
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        text-align: left;
        font-size: 0.85em;
    }
    .spec-item b { color: #2e7d32; display: block; text-transform: uppercase; font-size: 0.75em; }
</style>

<div class="auction-board">
    <div id="sold-overlay"><h2>SOLD!</h2><p id="final-msg"></p></div>
    
    <div class="timer-box" id="timer-display">60</div>
    <div id="lot-name" style="font-weight: bold; font-size: 1.2em; margin-top:10px;">LOT-102 (Green Cardamom)</div>
    
    <div class="specs-grid">
        <div class="spec-item"><b>Quantity</b><span id="spec-qty">-</span></div>
        <div class="spec-item"><b>Moisture</b><span id="spec-moisture">-</span></div>
        <div class="spec-item"><b>Size</b><span id="spec-size">-</span></div>
        <div class="spec-item"><b>Color</b><span id="spec-color">-</span></div>
        <div class="spec-item"><b>Shape</b><span id="spec-shape">-</span></div>
        <div class="spec-item"><b>Liter Weight</b><span id="spec-lw">-</span></div>
    </div>

    <h1 id="current-bid">₹0</h1>
    <p>High Bidder: <strong id="bidder-id">None</strong></p>
</div>

<script>
    socket.on('updateBid', (data) => {
        currentBid = data.highestBid;
        document.getElementById('lot-name').innerText = data.currentLot;
        document.getElementById('current-bid').innerText = '₹' + data.highestBid;
        document.getElementById('bidder-id').innerText = data.highestBidder;
        
        // Update Specifications
        document.getElementById('spec-qty').innerText = data.specs.quantity;
        document.getElementById('spec-moisture').innerText = data.specs.moisture;
        document.getElementById('spec-size').innerText = data.specs.size;
        document.getElementById('spec-color').innerText = data.specs.color;
        document.getElementById('spec-shape').innerText = data.specs.shape;
        document.getElementById('spec-lw').innerText = data.specs.literWeight;

        document.getElementById('sold-overlay').style.display = "none";
    });
</script>
