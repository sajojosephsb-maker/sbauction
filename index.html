<style>
    .leaderboard { margin-top: 20px; width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .leader-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
</style>

<div class="leaderboard">
    <h3>🏆 Live Leaderboard</h3>
    <div id="leaderboard-list">Waiting for bids...</div>
</div>

<script>
    // Add this inside your socket.on('updateBid') function
    socket.on('updateBid', (data) => {
        // ... existing display updates ...
        
        // Update Leaderboard Logic
        if (data.leaderboard) {
            let html = '';
            data.leaderboard.forEach(entry => {
                html += `<div class="leader-row"><span>${entry.name}</span><strong>${entry.lots} Lots</strong></div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = html;
        }
    });
</script>
