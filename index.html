<div style="background: #fff5f5; padding: 15px; border: 2px solid #c53030; border-radius: 8px; margin-top: 20px;">
    <h3 style="color: #c53030; margin-top: 0;">🚫 Buyer Management</h3>
    <input type="text" id="ban-name" placeholder="Enter Bidder Name to Block">
    <button onclick="manageBuyer('BAN_BUYER')" style="background: #c53030; color: white;">BLOCK BUYER</button>
    <button onclick="manageBuyer('UNBAN_BUYER')" style="background: #2f855a; color: white;">UNBLOCK</button>
</div>

<script>
    function manageBuyer(action) {
        const name = document.getElementById('ban-name').value;
        const pass = document.getElementById('admin-pass').value;
        if (!name) return alert("Enter a name");
        
        socket.emit('adminAction', { 
            action: action, 
            buyerName: name, 
            password: pass 
        });
        alert(`Action ${action} sent for: ${name}`);
    }

    socket.on('buyerBanned', (data) => {
        if (window.myName === data.name) {
            alert("Your bidding privileges have been suspended by the administrator.");
            location.reload(); // Force refresh to disconnect
        }
    });
</script>
