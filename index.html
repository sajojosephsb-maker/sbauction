<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Spice Auction - Spices Board</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background-color: #f0f4f0; }
        .container { max-width: 600px; margin: 0 auto; position: relative; }
        .auction-board { border: 3px solid #2e7d32; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; overflow: hidden; }
        
        /* Timer Style */
        .timer-box { font-size: 2.5em; font-weight: bold; color: #d32f2f; margin-bottom: 10px; }
        .timer-label { font-size: 0.7em; color: #999; text-transform: uppercase; }
        
        h1 { color: #2e7d32; font-size: 3.5em; margin: 5px 0; }
        .history-panel { background: white; border-radius: 10px; padding: 15px; text-align: left; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        
        /* Sold Overlay */
        #sold-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 10; flex-direction: column; justify-content: center; align-items: center; }
        #sold-overlay h2 { color: #d32f2f; font-size: 3em; transform: rotate(-10deg); border: 5px solid #d32f2f; padding: 10px 30px; }

        input { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; width: 150px; }
        button { padding: 12px 25px; font-size: 16px; background-color: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #333;">Spices Board Live e-Auction</h2>
        
        <div class="auction-board">
            <div id="sold-overlay">
                <h2>SOLD!</h2>
                <p id="final-msg"></p>
            </div>

            <div class="timer-box">
                <span id="timer-display">60</span><span style="font-size: 0.4em;">s</span>
                <div class="timer-label">Time Remaining</div>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <div style="font-size: 0.8em; color: #666;">LOT-102 (Green Cardamom)</div>
            <h1 id="current-bid">₹1450</h1>
            <p>Highest Bidder: <strong id="bidder-id">None</strong></p>
        </div>

        <div style="margin-bottom: 30px;" id="bid-controls">
            <input type="number" id="bid-input" placeholder="Enter Amount">
            <button id="bid-btn" onclick="placeBid()">Place Bid</button>
        </div>

        <div class="history-panel">
            <div style="font-size: 0.8em; color: #999; margin-bottom: 10px;">RECENT BID HISTORY</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const socket = io('https://spice-auction-server.onrender.com'); 
        let currentBid = 0;

        socket.on('timerUpdate', (timeLeft) => {
            document.getElementById('timer-display').innerText = timeLeft;
            if (timeLeft <= 10) {
                document.getElementById('timer-display').style.color = "red";
            } else {
                document.getElementById('timer-display').style.color = "#d32f2f";
            }
        });

        socket.on('updateBid', (data) => {
            currentBid = data.highestBid;
            document.getElementById('current-bid').innerText = '₹' + data.highestBid;
            document.getElementById('bidder-id').innerText = data.highestBidder;

            const historyDiv = document.getElementById('history-list');
            if (data.bidHistory.length > 0) {
                historyDiv.innerHTML = data.bidHistory.map(bid => `
                    <div class="history-item">
                        <span><strong>₹${bid.amount}</strong> by ${bid.bidder}</span>
                        <span style="color: #888;">${bid.time}</span>
                    </div>
                `).join('');
            }
        });

        socket.on('auctionEnded', (data) => {
            document.getElementById('sold-overlay').style.display = "flex";
            document.getElementById('final-msg').innerText = `Winner: ${data.highestBidder} at ₹${data.highestBid}`;
            document.getElementById('bid-btn').disabled = true;
            document.getElementById('bid-input').disabled = true;
        });

        function placeBid() {
            const inputField = document.getElementById('bid-input');
            const newBid = parseInt(inputField.value);
            if (newBid > currentBid) {
                socket.emit('placeBid', { amount: newBid });
                inputField.value = '';
            } else {
                alert("Your bid must be higher than ₹" + currentBid);
            }
        }
    </script>
</body>
</html>
