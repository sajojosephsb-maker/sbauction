<div class="card" style="margin-top:20px; border-left: 5px solid #3498db;">
    <h2>🏢 Company Management</h2>
    <input type="text" id="cId" placeholder="Company ID">
    <input type="password" id="cPass" placeholder="Password">
    <button onclick="createAccount('company')" style="background:#3498db;">Create Company Login</button>
</div>

<script>
    function createAccount(role) {
        const userId = role === 'company' ? document.getElementById('cId').value : document.getElementById('tId').value;
        const password = role === 'company' ? document.getElementById('cPass').value : document.getElementById('tPass').value;
        socket.emit('createAccount', { userId, password, role });
    }
</script>
