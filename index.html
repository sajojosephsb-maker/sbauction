<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    .chart-container {
        background: white;
        padding: 20px;
        border-radius: 15px;
        margin-top: 30px;
        border: 1px solid #ddd;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
</style>

<div class="chart-container">
    <h3 style="color: #2e7d32; margin-top: 0;">Session Price Trends</h3>
    <canvas id="trendChart"></canvas>
</div>

<script>
    let trendChart;

    function initChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Lot numbers go here
                datasets: [{
                    label: 'Price (₹/kg)',
                    data: [], // Prices go here
                    borderColor: '#2e7d32',
                    backgroundColor: 'rgba(46, 125, 50, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: false, grid: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // Listen for history updates from the server
    socket.on('updateHistory', (history) => {
        if (!trendChart) initChart();
        
        trendChart.data.labels = history.map(h => h.label);
        trendChart.data.datasets[0].data = history.map(h => h.price);
        trendChart.update();
    });

    initChart(); // Initialize on page load
</script>
