<div id="catalogue-upload" style="background: #fdfdfd; padding: 20px; border: 1px solid #ddd; margin-top: 20px;">
    <h3>📋 Catalogue & Lot Specs</h3>
    <p>Paste your lot data here in the requested format:</p>
    <textarea id="csv-input" style="width:100%; height:150px;" placeholder="Lot Number	Collection Centre	Planter Name..."></textarea>
    <button onclick="processCatalogue()" style="background: #1a73e8; color: white; padding: 10px 20px;">Load Catalogue</button>
</div>

<script>
    function processCatalogue() {
        const rawData = document.getElementById('csv-input').value;
        const rows = rawData.split('\n');
        const lots = rows.map(row => {
            const cols = row.split('\t'); // Splits by Tab
            return {
                lotNumber: cols[0],
                collectionCentre: cols[1],
                planterDealer: cols[2],
                planterName: cols[3],
                crNo: cols[4],
                receiptNo: cols[5],
                quantity: cols[6],
                litreWeight: cols[7],
                bags: cols[8],
                gradeType: cols[9],
                grade: cols[10],
                reservedPrice: cols[11],
                auctionStartPrice: cols[12],
                immatureSeeds: cols[13],
                moisture: cols[14],
                mobile: cols[15],
                specialLot: cols[16],
                colour: cols[17],
                size: cols[18],
                rejectionSplit: cols[19]
            };
        });
        socket.emit('uploadCatalogue', { lots: lots, password: 'spices_admin_2026' });
        alert("Catalogue Loaded Successfully!");
    }
</script>
