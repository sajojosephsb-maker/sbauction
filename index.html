<script>
    // This function checks the 'My Purchase History' we built earlier
    function getSessionSpentTotal() {
        const history = JSON.parse(localStorage.getItem('mySpiceWins') || "[]");
        // Sum up (Price * Weight) for every item won in this session
        return history.reduce((sum, item) => sum + (item.price * item.specs.totalWeight), 0);
    }

    // Refresh the Credit UI every time the auction state changes
    socket.on('updateBid', (data) => {
        // ... (existing update logic)
        
        const spent = getSessionSpentTotal();
        const limit = 1000000;
        const usagePercent = (spent / limit) * 100;

        document.getElementById('spent-display').innerText = spent.toLocaleString('en-IN');
        const bar = document.getElementById('progress-fill');
        bar.style.width = usagePercent + "%";
        
        // Color coding for safety
        if (usagePercent > 90) bar.style.background = "#d32f2f"; // Danger
        else if (usagePercent > 70) bar.style.background = "#f39c12"; // Warning
    });

    function placeBid() {
        const val = parseInt(document.getElementById('bid-input').value);
        if (val > currentBid) {
            socket.emit('placeBid', { 
                amount: val, 
                bidderName: myName,
                // CRITICAL: Send the total of all previously won lots
                currentSpent: getSessionSpentTotal() 
            });
            document.getElementById('bid-input').value = '';
        }
    }
</script>
