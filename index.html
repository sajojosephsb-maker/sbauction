<div style="background: #1a237e; color: white; padding: 15px; border-radius: 8px; margin-top: 20px;">
    <h3 style="margin-top: 0; border-bottom: 1px solid #3f51b5;">🏆 Top Buyer Ranking</h3>
    <ul id="ranking-list" style="list-style: none; padding: 0;">
        <li style="padding: 5px 0; border-bottom: 1px outline #3f51b5;">Waiting for first sale...</li>
    </ul>
</div>

<script>
    socket.on('updateRanking', (data) => {
        const list = document.getElementById('ranking-list');
        list.innerHTML = data.map((buyer, index) => `
            <li style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #3f51b5;">
                <span>${index + 1}. <strong>${buyer.name}</strong></span>
                <span>₹${buyer.total.toLocaleString('en-IN')}</span>
            </li>
        `).join('');
    });
</script>
