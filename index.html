<div class="card" style="max-width: 600px;">
    <h3>👥 User Management</h3>
    <button class="btn" onclick="socket.emit('getUsers')" style="background:#3498db; margin-bottom:10px;">Refresh User List</button>
    <table style="width:100%; font-size: 0.8rem;">
        <thead><tr><th>Name</th><th>ID</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="user-table"></tbody>
    </table>
</div>

<script>
    socket.on('userList', (users) => {
        const tbody = document.getElementById('user-table');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.name}</td>
                <td>${u.userId}</td>
                <td style="color:${u.isApproved ? 'green' : 'red'}">${u.isApproved ? 'Approved' : 'Pending'}</td>
                <td>
                    ${u.isApproved ? '' : `<button onclick="approve('${u.userId}')" style="font-size:0.7rem;">Approve</button>`}
                </td>
            </tr>
        `).join('');
    });

    function approve(id) {
        socket.emit('approveUser', { targetId: id, password: "spices_admin_2026" });
    }
</script>
