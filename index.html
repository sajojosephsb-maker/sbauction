<div style="background: #e3f2fd; padding: 20px; border: 2px solid #2196f3; border-radius: 10px;">
    <h3>🕹️ Auction Control Center</h3>
    
    <label>Next Lot ID:</label>
    <input type="text" id="next-lot-id" placeholder="e.g., LOT-102">
    
    <label>AI Suggested Start:</label>
    <input type="number" id="start-price" placeholder="Rate (₹)">

    <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="sendAdminAction('START_AUCTION')" style="background: #4caf50; color: white;">🚀 START LOT</button>
        <button onclick="sendAdminAction('CLOSE_MANUAL')" style="background: #ff9800; color: white;">🔨 CLOSE NOW</button>
        <button onclick="sendAdminAction('WITHDRAW')" style="background: #f44336; color: white;">🚫 WITHDRAW</button>
        <button onclick="rerunLot()" style="background: #9c27b0; color: white;">🔄 RERUN LOT</button>
    </div>
</div>

<script>
    function sendAdminAction(action) {
        const pass = document.getElementById('admin-pass').value;
        const lot = document.getElementById('next-lot-id').value;
        const price = document.getElementById('start-price').value;
        
        socket.emit('adminControl', { 
            action: action, 
            password: pass, 
            lotId: lot, 
            startPrice: parseFloat(price) 
        });
    }

    function rerunLot() {
        // Keeps the same Lot ID but resets bidding
        document.getElementById('start-price').value = "1000"; // Or AI suggested price
        sendAdminAction('START_AUCTION');
    }
</script>
