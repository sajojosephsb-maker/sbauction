<td style="padding: 5px; border: 1px solid #ddd;">
    <input type="number" id="limit-${buyer.username}" value="1000000" style="width: 80px;">
    <button onclick="approveWithLimit('${buyer.username}')" style="background: #2e7d32; color: white;">Approve</button>
</td>

<script>
function approveWithLimit(username) {
    const pass = document.getElementById('admin-pass').value;
    const limitVal = document.getElementById(`limit-${username}`).value;
    
    socket.emit('adminAction', {
        action: 'approve_buyer',
        targetUser: username,
        password: pass,
        limit: parseInt(limitVal)
    });
}
</script>
