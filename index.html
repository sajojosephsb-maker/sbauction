<div style="background: #fff3e0; border-left: 5px solid #ff9800; padding: 15px; margin-top: 20px;">
    <h4>📱 Planter SMS Log</h4>
    <div id="sms-log" style="font-size: 12px; max-height: 100px; overflow-y: auto;">
        Waiting for sales...
    </div>
</div>

<script>
    socket.on('auctionEnded', (state) => {
        if (state.highestBidder !== "No Bids") {
            const log = document.getElementById('sms-log');
            const entry = `<div>✅ SMS Sent to ${state.planterMobile}: Lot ${state.currentLot} @ ₹${state.highestBid}</div>`;
            log.innerHTML = entry + log.innerHTML;
        }
    });
</script>
