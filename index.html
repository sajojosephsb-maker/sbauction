<div style="background: #e8f5e9; padding: 15px; border: 1px solid #2e7d32; border-radius: 8px; margin-top: 10px;">
    <h4>💰 Financial & Security Controls</h4>
    <input type="text" id="target-buyer" placeholder="Buyer Name">
    <input type="number" id="limit-amount" placeholder="Credit Limit (₹)">
    
    <div style="margin-top: 10px;">
        <button onclick="finAction('SET_CREDIT')" style="background: #2e7d32; color: white;">Set Credit Limit</button>
        <button onclick="finAction('BAN_BUYER')" style="background: #c62828; color: white;">Ban Buyer</button>
    </div>
</div>

<script>
    function finAction(action) {
        const name = document.getElementById('target-buyer').value;
        const amount = document.getElementById('limit-amount').value;
        const pass = document.getElementById('admin-pass').value;
        
        socket.emit('adminAction', { 
            action: action, 
            buyerName: name, 
            amount: amount, 
            password: pass 
        });
    }
</script>
