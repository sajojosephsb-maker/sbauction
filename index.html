<div style="background: #f4f4f4; padding: 20px; border-radius: 10px; border: 2px solid #333;">
    <h3>🛠️ Manual Auction Controls</h3>
    
    <div style="margin-bottom: 15px;">
        <button onclick="control('ACCEPT')" style="background: #4caf50; color: white;">✅ ACCEPT BID</button>
        <button onclick="control('RERUN')" style="background: #2196f3; color: white;">🔄 RERUN LOT</button>
        <button onclick="control('WITHDRAW')" style="background: #f44336; color: white;">🚫 WITHDRAW</button>
        <button onclick="control('SKIP')" style="background: #9e9e9e; color: white;">⏭️ SKIP</button>
    </div>

    <div style="border-top: 1px solid #ccc; pt: 10px;">
        <h4 style="color: #d32f2f;">⚠️ Quality Alerts</h4>
        <button onclick="alertQuality('Artificially Coloured')" style="background: #ffeb3b;">🎨 Artificially Coloured</button>
        <button onclick="alertQuality('Suspected/Sample Mismatch')" style="background: #ff9800;">🔍 Suspected</button>
    </div>
</div>

<script>
    function control(action) {
        const pass = document.getElementById('admin-pass').value;
        socket.emit('adminAction', { action: action, password: pass });
    }

    function alertQuality(note) {
        const pass = document.getElementById('admin-pass').value;
        socket.emit('adminAction', { action: 'QUALITY_ALERT', note: note, password: pass });
    }
</script>
