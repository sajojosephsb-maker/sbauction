<button onclick="exportToExcel()" style="background: #1b5e20; color: white; padding: 15px; border-radius: 5px; cursor: pointer;">
    📥 Download Today's Sales (Excel)
</button>

<script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
<script>
    function exportToExcel() {
        const pass = document.getElementById('admin-pass').value;
        socket.emit('adminAction', { action: 'EXPORT_DATA', password: pass });
    }

    socket.on('downloadExcel', (data) => {
        if (data.length === 0) return alert("No sales recorded yet!");
        
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Daily Sales");
        XLSX.writeFile(workbook, `Auction_Report_${new Date().toLocaleDateString()}.xlsx`);
    });
</script>
