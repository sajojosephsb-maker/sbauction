<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spice Auction Admin</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .admin-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; background: #fafafa; padding: 15px; border-radius: 8px; text-align: left; }
        .timer-box { font-size: 2.5rem; font-weight: bold; color: #e74c3c; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .btn-upload { background: #3498db; color: white; position: relative; overflow: hidden; }
        .btn-accept { background: #27ae60; color: white; }
        #csvFile { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Auction Controller</h2>
    <div class="timer-box" id="timer">00</div>
    <div class="status-grid">
        <div><strong>Lot:</strong> <span id="current-lot">IDLE</span></div>
        <div><strong>Weight:</strong> <span id="weight">0.00 kg</span></div>
        <div><strong>Price:</strong> <span id="highest-bid">₹0</span></div>
        <div><strong>Bidder:</strong> <span id="highest-bidder">No Bids</span></div>
    </div>
    <div class="btn btn-upload">
        1. UPLOAD CSV CATALOGUE
        <input type="file" id="csvFile" accept=".csv">
    </div>
    <button class="btn btn-accept" onclick="acceptSale()">2. ✅ ACCEPT & NEXT LOT</button>
</div>

<script>
    const socket = io("https://spice-auction-server.onrender.com");
    const ADMIN_PASS = "spices_admin_2026";

    socket.on('updateBid', (data) => {
        document.getElementById('current-lot').innerText = data.currentLot;
        document.getElementById('weight').innerText = data.weight + " kg";
        document.getElementById('highest-bid').innerText = "₹" + data.highestBid;
        document.getElementById('highest-bidder').innerText = data.highestBidder;
        document.getElementById('timer').innerText = data.timeLeft;
    });

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            const rows = text.split('\n').filter(row => row.trim() !== "");
            const list = rows.slice(1).map(row => {
                const cols = row.split(',');
                return { lotNumber: cols[0].trim(), weight: parseFloat(cols[1]), startPrice: parseInt(cols[2]) };
            });
            socket.emit('uploadCatalogue', { list: list, password: ADMIN_PASS });
            alert("Loaded " + list.length + " items!");
        };
        reader.readAsText(file);
    });

    function acceptSale() {
        socket.emit('adminAction', { action: 'ACCEPT_AND_NEXT', password: ADMIN_PASS });
    }
</script>
</body>
</html>
