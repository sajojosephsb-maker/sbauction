<div style="font-family: sans-serif; padding: 20px;">
    <h2 style="color: #1a237e;">📜 Live Auction Results (Public)</h2>
    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr style="background: #eeeeee;">
                <th style="padding: 10px; border: 1px solid #ccc;">Lot</th>
                <th style="padding: 10px; border: 1px solid #ccc;">Buyer</th>
                <th style="padding: 10px; border: 1px solid #ccc;">Rate (₹)</th>
                <th style="padding: 10px; border: 1px solid #ccc;">Total Value (Incl. Tax)</th>
            </tr>
        </thead>
        <tbody id="results-body">
            </tbody>
    </table>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://spice-auction-server.onrender.com");
    
    socket.on('initialResults', (records) => {
        records.forEach(addRecord);
    });

    socket.on('newResult', addRecord);

    function addRecord(data) {
        const row = `<tr>
            <td style="padding: 10px; border: 1px solid #ccc;">${data.lot}</td>
            <td style="padding: 10px; border: 1px solid #ccc;">${data.buyer}</td>
            <td style="padding: 10px; border: 1px solid #ccc;">₹${data.rate}</td>
            <td style="padding: 10px; border: 1px solid #ccc; font-weight: bold;">₹${data.totalValue}</td>
        </tr>`;
        document.getElementById('results-body').innerHTML = row + document.getElementById('results-body').innerHTML;
    }
</script>
